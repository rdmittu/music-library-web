version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        - bash scripts/generate-env.sh
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/music-library/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
