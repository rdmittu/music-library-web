version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        - printf "export const environment = {\n  production: true,\n  apiUrl: '%s',\n  cognitoUserPoolId: '%s',\n  cognitoClientId: '%s',\n  cognitoDomain: '%s',\n  redirectUrl: '%s',\n};\n" "$API_URL" "$COGNITO_USER_POOL_ID" "$COGNITO_CLIENT_ID" "$COGNITO_DOMAIN" "$REDIRECT_URL" > src/environments/environment.ts
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/music-library/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
